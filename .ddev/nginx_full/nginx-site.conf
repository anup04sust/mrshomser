# Next.js proxy configuration
# This proxies all requests from the main DDEV URL to the Next.js dev server
# Customized - DDEV will not overwrite this file

server {
    listen 80 default_server;
    listen 443 ssl default_server;
    
    root /var/www/html;
    
    ssl_certificate /etc/ssl/certs/master.crt;
    ssl_certificate_key /etc/ssl/certs/master.key;
    
    include /etc/nginx/monitoring.conf;
    
    index index.html index.htm;
    
    # Disable sendfile as per ddev recommendation
    sendfile off;
    error_log /dev/stdout info;
    access_log /var/log/nginx/access.log;
    
    location / {
        # Proxy to Next.js dev server
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        
        # WebSocket support for HMR (Hot Module Replacement)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Standard proxy headers
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Increase timeouts for Next.js
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # Static files - serve directly when possible
    location /_next/static {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_cache_bypass $http_upgrade;
    }
    
    # Public files
    location /public {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
    }
    
    # Prevent clients from accessing hidden files (starting with a dot)
    # Access to `/.well-known/` is allowed.
    location ~* /\.(?!well-known\/) {
        deny all;
    }
    
    include /etc/nginx/common.d/*.conf;
    include /mnt/ddev_config/nginx/*.conf;
}
