<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="45" fill="#7C3AED"/>
  
  <!-- Robot head -->
  <rect x="30" y="35" width="40" height="35" rx="8" fill="#FCD34D"/>
  
  <!-- Eyes -->
  <circle cx="40" cy="50" r="4" fill="#1F2937"/>
  <circle cx="60" cy="50" r="4" fill="#1F2937"/>
  
  <!-- Smile -->
  <path d="M 38 60 Q 50 68 62 60" stroke="#1F2937" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <!-- Antenna -->
  <line x1="50" y1="35" x2="50" x2="25" stroke="#FCD34D" stroke-width="3" stroke-linecap="round"/>
  <circle cx="50" cy="23" r="4" fill="#F59E0B"/>
  
  <!-- Arms -->
  <rect x="20" y="50" width="8" height="15" rx="4" fill="#FCD34D"/>
  <rect x="72" y="50" width="8" height="15" rx="4" fill="#FCD34D"/>
</svg>
