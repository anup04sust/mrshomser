<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">

  <defs>
    <!-- background -->
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>

    <!-- face -->
    <linearGradient id="face" x1="150" y1="120" x2="360" y2="380">
      <stop stop-color="#D8EEFF"/>
      <stop offset="1" stop-color="#A7D8FF"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- face bubble -->
  <rect x="76" y="76" width="360" height="320" rx="120" fill="url(#face)"/>

  <!-- glow eyes -->
  <g>
    <!-- whites -->
    <ellipse cx="210" cy="210" rx="55" ry="65" fill="#ECFEFF"/>
    <ellipse cx="310" cy="210" rx="48" ry="58" fill="#ECFEFF"/>

    <!-- pupils -->
    <ellipse cx="210" cy="220" rx="26" ry="32" fill="#0F172A"/>
    <ellipse cx="310" cy="222" rx="22" ry="28" fill="#0F172A"/>

    <!-- AI glow -->
    <circle cx="210" cy="220" r="6" fill="#22D3EE"/>
    <circle cx="310" cy="222" r="6" fill="#22D3EE"/>
  </g>

  <!-- smile -->
  <path d="M180 300 C220 360, 300 360, 340 300"
        fill="none"
        stroke="#22D3EE"
        stroke-width="10"
        stroke-linecap="round"/>

  <!-- tongue -->
  <path d="M300 320
        C315 325, 325 340, 320 360
        C315 375, 295 375, 285 360
        C275 340, 285 325, 300 320 Z"
        fill="#3B82F6"
        opacity="0.8"/>

  </svg>
